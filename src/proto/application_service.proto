syntax = "proto3";

package application;

option go_package = "ricitelli-back/cmd/http/gen/application_service;applicationpb";

import "sale_order.proto";

// CreateOrderRequest creates a SaleOrder + ProductionOrder atomically.
message CreateOrderRequest {
  string customer_id         = 1;
  repeated sale_order.SaleOrderItem items = 2;
  // Commercial context — same fields as CreateSaleOrderRequest
  string currency            = 3; // ARS | USD | CAD | EUR
  string market              = 4; // DOMESTIC | EXPORT
  string destination_country = 5;
  string sale_type           = 6; // SALE | SAMPLE_CUSTOMS | GIFT | INTERNAL | COMMERCIAL_SAMPLE
  float  unit_price          = 7; // default price when items don't specify
}

message CreateOrderResponse {
  string message = 1;
}

service ApplicationService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
}
