syntax = "proto3";

package application;

option go_package = "ricitelli-back/cmd/http/gen/application_service;applicationpb";

import "google/protobuf/empty.proto";
import "sale_order.proto";
import "production_order.proto";
import "product.proto";

// Request para crear orden de venta + producción
message CreateOrderRequest {
  string customer_id = 1;
  repeated sale_order.SaleOrderItem items = 2;
}

// Respuesta simple (OK)
message CreateOrderResponse {
  string message = 1; // "Order created"
}

// Servicio de aplicación
service ApplicationService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
}