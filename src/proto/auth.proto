syntax = "proto3";

package auth;

option go_package = "ricitelli-back/cmd/http/gen/auth;authpb";

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token      = 1;
  string expires_at = 2;
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
}
