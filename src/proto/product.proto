syntax = "proto3";

package product;

option go_package = "ricitelli-back/cmd/http/gen/product;productpb";

import "google/protobuf/empty.proto";

// Represents a manufacturable product with its bill of dry supplies (BODS).
message Product {
  string id        = 1;
  string name      = 2;
  repeated BillOfDrySupply bods = 3;
  string image_url = 4;
}

// Represents the quantity of a dry supply required per unit of product.
message BillOfDrySupply {
  string dry_supply_id    = 1;
  uint64 quantity_per_unit = 2;
}

message CreateProductRequest {
  string name = 1;
  repeated BillOfDrySupply bods = 2;
}

message UpdateProductRequest {
  string id   = 1;
  string name = 2;
  repeated BillOfDrySupply bods = 3;
}

message SetProductImageRequest {
  string id        = 1;
  string image_url = 2;
}

message GetProductByIDRequest {
  string id = 1;
}

message GetProductsResponse {
  repeated Product products = 1;
}

service ProductService {

  rpc CreateProduct(CreateProductRequest)
      returns (google.protobuf.Empty);

  rpc UpdateProduct(UpdateProductRequest)
      returns (google.protobuf.Empty);

  rpc SetProductImage(SetProductImageRequest)
      returns (google.protobuf.Empty);

  rpc GetProductByID(GetProductByIDRequest)
      returns (Product);

  rpc GetProducts(google.protobuf.Empty)
      returns (GetProductsResponse);
}
