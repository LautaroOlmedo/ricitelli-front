syntax = "proto3";

package product;

option go_package = "your/module/path/productpb";

import "google/protobuf/empty.proto";




// Represents a manufacturable product with its bill of materials (BOM).
message Product {
  string id = 1;
  string name = 2;
  repeated BillOfDrySupply bom = 3;
}

// Represents the quantity of a dry supply required per unit of product.
message BillOfDrySupply {
  string dry_supply_id = 1;
  uint64 quantity_per_unit = 2;
}

message CreateProductRequest {
  string name = 1;
  repeated BillOfDrySupply bom = 2;
}

message GetProductByIDRequest {
  string id = 1;
}

message GetProductsResponse {
  repeated Product products = 1;
}

service ProductService {

  // Creates a product. Returns OK or gRPC error.
  rpc CreateProduct(CreateProductRequest)
      returns (google.protobuf.Empty);

  // Returns a single product by ID.
  rpc GetProductByID(GetProductByIDRequest)
      returns (Product);

  // Returns all products.
  rpc GetProducts(google.protobuf.Empty)
      returns (GetProductsResponse);
}