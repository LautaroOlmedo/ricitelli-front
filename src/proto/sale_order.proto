syntax = "proto3";

package sale_order;

option go_package = "ricitelli-back/cmd/http/gen/sale_order;saleorderpb";

import "google/protobuf/empty.proto";
import "product.proto";

// SaleOrderItem represents one line in a sale order.
message SaleOrderItem {
  string product_id = 1;
  uint64 quantity   = 2;
  float  unit_price = 3;
}

// SaleOrder represents a customer order with its full commercial context.
message SaleOrder {
  string id                  = 1;
  string customer_id         = 2;
  string status              = 3; // NEW | CONFIRMED | INVOICED | DISPATCHED | CANCELLED
  repeated SaleOrderItem items = 4;
  string created_at          = 5;
  // Commercial context (new fields)
  string currency            = 6; // ARS | USD | CAD | EUR
  string market              = 7; // DOMESTIC | EXPORT
  string destination_country = 8; // ISO-3166 alpha-2, e.g. "AR", "GB", "JP"
  string sale_type           = 9; // SALE | SAMPLE_CUSTOMS | GIFT | INTERNAL | COMMERCIAL_SAMPLE
}

message CreateSaleOrderRequest {
  string customer_id         = 1;
  repeated SaleOrderItem items = 2;
  string currency            = 3;
  string market              = 4;
  string destination_country = 5;
  string sale_type           = 6;
}

message GetSaleOrderByIDRequest {
  string id = 1;
}

message GetSaleOrdersResponse {
  repeated SaleOrder sale_orders = 1;
}

// UpdateSaleOrderStatusRequest advances the order pipeline.
message UpdateSaleOrderStatusRequest {
  string id     = 1;
  string status = 2; // target status
}

// GetSaleOrdersByDateRangeRequest filters orders by creation date (inclusive).
// Dates must be in YYYY-MM-DD format (e.g. "2025-04-01").
message GetSaleOrdersByDateRangeRequest {
  string from_date = 1; // start of range, inclusive (YYYY-MM-DD)
  string to_date   = 2; // end of range, inclusive (YYYY-MM-DD)
}

service SaleOrderService {
  rpc CreateSaleOrder(CreateSaleOrderRequest)                         returns (SaleOrder);
  rpc GetSaleOrderByID(GetSaleOrderByIDRequest)                       returns (SaleOrder);
  rpc GetSaleOrders(google.protobuf.Empty)                            returns (GetSaleOrdersResponse);
  rpc UpdateSaleOrderStatus(UpdateSaleOrderStatusRequest)             returns (SaleOrder);
  rpc GetSaleOrdersByDateRange(GetSaleOrdersByDateRangeRequest)       returns (GetSaleOrdersResponse);
}
